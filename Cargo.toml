[package]
name = "oxideav-tta"
version = "0.0.1"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/OxideAV/oxideav-tta"
authors = ["Mark Karpeles"]
description = "Pure-Rust True Audio (TTA) lossless audio decoder for the oxideav framework"

readme = "README.md"
homepage = "https://github.com/OxideAV/oxideav-tta"
keywords = ["multimedia", "audio", "tta", "lossless", "pure-rust"]
categories = ["multimedia::encoding", "multimedia::audio"]

[dependencies]
oxideav-core = "0.1"

# This crate normally lives as a `crates/*` member of the OxideAV
# umbrella workspace at https://github.com/OxideAV/oxideav-workspace,
# which provides a [patch.crates-io] table that redirects every
# `oxideav-*` dep to the matching local checkout. When this manifest
# is opened standalone (or when sibling worktrees in the umbrella are
# in flux during a multi-agent bootstrap), declaring an empty
# `[workspace]` table here stops cargo from climbing up into the
# umbrella manifest — the standalone build then resolves
# `oxideav-core` from crates.io as usual.
[workspace]
