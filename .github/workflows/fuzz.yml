name: Fuzz

# Daily fuzz run for the cargo-fuzz harness under fuzz/. TTA's framing
# decoder (TTA1 header + seek table + per-frame entropy bodies) is a
# single linear parse with no external library oracle worth pulling in
# (and the clean-room wall bars the C reference `libtta` anyway), so
# this is a decode-only panic-free harness: one target gets the whole
# 30-minute budget.

on:
  schedule:
    - cron: "53 6 * * *"   # daily 06:53 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      time_budget_seconds: 1800
    secrets: inherit
